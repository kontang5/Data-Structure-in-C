name: Feature request
description: Suggesting a new feature or improvement
title: "Feature: "
labels: enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief summary of the feature.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Explanation of the necessity or value.
      placeholder: |
        A description of why this feature is needed.
        
        Example: "The feature is needed because [...]"
        Example: "The feature would be useful because [...]"
      render: markdown
    validations:
        required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Description of the implementation.
      placeholder: |
        A description of the implementation.
        
        Example: "The feature will be implemented by [...]"
      render: markdown
    validations:
        required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other context, screenshots, or relevant details.
    validations:
        required: false


